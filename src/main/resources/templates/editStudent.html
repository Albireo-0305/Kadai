<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>受講生編集</title>
</head>
<body>
<h1>受講生編集</h1>

<form th:action="@{/updateStudent}"th:object="${studentDetail}" method="post">


  <input type="hidden" th:field="*{student.studentId}" />
  <input type="hidden" th:field="*{studentsCourses[0].courseId}" />

  <div>
      <label>名前：</label>
      <input type="text" th:field="*{student.name}" />
    </div>
    <div>
      <label>ふりがな：</label>
      <input type="text" th:field="*{student.furigana}" />
    </div>
    <div>
      <label>ニックネーム：</label>
      <input type="text" th:field="*{student.nickName}" />
    </div>
    <div>
      <label>メールアドレス：</label>
      <input type="email" th:field="*{student.emailAddress}" />
    </div>
    <div>
      <label>地域：</label>
      <input type="text" th:field="*{student.region}" />
    </div>
    <div>
      <label>年齢：</label>
      <input type="number" th:field="*{student.age}" />
    </div>
    <div>
      <label>性別：</label>
      <input type="text" th:field="*{student.gender}" />
    </div>
    <div>
      <label>備考：</label>
      <input type="text" th:field="*{student.remark}"/>
    </div>


  <hr>
    <h2>【コース情報】</h2>
    <div>
      <label>コース名：</label>
      <input type="text" th:field="*{studentsCourses[0].courseName}" />
    </div>
    <div>
      <label>開始日：</label>
      <input type="date" th:field="*{studentsCourses[0].startDate}" />
    </div>
    <div>
      <label>終了予定日：</label>
      <input type="date" th:field="*{studentsCourses[0].expectedEndDate}" />
    </div>
  </hr>

  <div>
    <button type="submit">更新</button>
  </div>
</form>

</body>
</html>
