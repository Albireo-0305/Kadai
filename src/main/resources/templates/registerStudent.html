<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>受講生登録</title>
</head>
<body>
<h1>受講生登録</h1>

<form th:action="@{/registerStudent}" th:object="${studentDetail}" method="post">
  <fieldset>
    <legend>受講生情報</legend>
    <div>
      <label>名前：</label>
      <input type="text" th:field="*{student.name}" required/>
    </div>
    <div>
      <label>ふりがな：</label>
      <input type="text" th:field="*{student.furigana}" required/>
    </div>
    <div>
      <label>ニックネーム：</label>
      <input type="text" th:field="*{student.nickName}" required/>
    </div>
    <div>
      <label>メールアドレス：</label>
      <input type="email" th:field="*{student.emailAddress}" required/>
    </div>
    <div>
      <label>地域：</label>
      <input type="text" th:field="*{student.region}" required/>
    </div>
    <div>
      <label>年齢：</label>
      <input type="number" th:field="*{student.age}" required/>
    </div>
    <div>
      <label>性別：</label>
      <input type="text" th:field="*{student.gender}" required/>
    </div>
    <div>
      <label>備考：</label>
      <input type="text" th:field="*{student.remark}"/>
    </div>
  </fieldset>

  <fieldset>
    <legend>【コース情報】</legend>
    <div>
      <label>コース名：</label>
      <input type="text" th:field="*{studentsCourses[0].courseName}" required/>
    </div>
    <div>
      <label>開始日：</label>
      <input type="date" th:field="*{studentsCourses[0].startDate}" required/>
    </div>
    <div>
      <label>終了予定日：</label>
      <input type="date" th:field="*{studentsCourses[0].expectedEndDate}" required/>
    </div>
  </fieldset>

  <div>
    <button type="submit">登録</button>
  </div>
</form>

</body>
</html>
